name: flutter_mvp
description: A Flutter project with MVP architecture.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.12.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.3
  floor: ^1.1.0
  intl: ^0.17.0
  settings_ui: ^1.0.0
  shared_preferences: ^2.0.5
  sqflite: ^2.0.0+3

dev_dependencies:
  build_runner: ^2.0.3
  floor_generator: ^1.1.0

  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true